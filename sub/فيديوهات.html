<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض المحاضرات</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f8f9fa;
        }
        #videoContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .video-item {
            margin: 20px;
            text-align: center;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .video-item img {
            max-width: 200px;
            height: auto;
        }
        .video-item a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        #pagination {
            text-align: center;
            margin-top: 20px;
        }
        #pagination button {
            margin: 0 5px;
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>عرض المحاضرات</h1>
    <div id="videoContainer"></div>
    
    <div id="pagination">
        <button id="prevBtn" onclick="loadVideos('prev')" disabled>السابق</button>
        <button id="nextBtn" onclick="loadVideos('next')">التالي</button>
    </div>

    <script>
        let currentPage = 1;
        const totalPages = 36; // يمكنك تحديث هذا إذا كان الـ API يوفر عدد الصفحات

        function loadVideos(direction) {
            let url;

            if (direction === 'next') {
                currentPage++;
            } else if (direction === 'prev') {
                currentPage--;
            }

            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            url = `https://api3.islamhouse.com/v3/paV29H2gm56kvLPy/main/videos/ar/ar/${currentPage}/25/json`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    displayVideos(data.data);
                    updatePagination(data.links);
                })
                .catch(error => console.error('Error:', error));
        }

        function displayVideos(videos) {
            const videoContainer = document.getElementById('videoContainer');
            videoContainer.innerHTML = '';

            videos.forEach(video => {
                const title = video.title;
                const imageUrl = video.image;
                const videoUrl = video.attachments[0].url;

                const videoElement = `
                    <div class="video-item">
                        <h3>${title}</h3>
                        <img src="${imageUrl}" alt="${title}">
                        <a href="${videoUrl}" target="_blank">شاهد الفيديو</a>
                    </div>
                `;

                videoContainer.innerHTML += videoElement;
            });
        }

        function updatePagination(links) {
            document.getElementById('prevBtn').disabled = !links.prev;
            document.getElementById('nextBtn').disabled = !links.next;
        }

        // تحميل الفيديوهات عند بدء الصفحة
        loadVideos();
    </script>

</body>
</html>
